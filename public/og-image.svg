<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#1c1917"/>

  <!-- Subtle grid pattern -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="#e7e5e4" stroke-width="0.5"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#e7e5e4" stroke-width="0.5"/>

  <!-- Main title -->
  <text x="80" y="260" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="900" letter-spacing="-4" fill="#1c1917">ABOJC</text>

  <!-- Horizontal rule -->
  <rect x="80" y="290" width="120" height="3" fill="#1c1917"/>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="6" fill="#78716c">JOURNAL CLUB</text>

  <!-- Japanese description -->
  <text x="80" y="400" font-family="'Noto Sans JP', 'Hiragino Sans', sans-serif" font-size="22" font-weight="400" fill="#57534e">矯正歯科の科学的知見と解釈を発信するグループ</text>

  <!-- Bottom accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#1c1917"/>

  <!-- Decorative corner element -->
  <rect x="1140" y="50" width="30" height="3" fill="#a8a29e"/>
  <rect x="1167" y="50" width="3" height="30" fill="#a8a29e"/>
</svg>
